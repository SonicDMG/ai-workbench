# Default dev config. With no `controlPlane:` block, the runtime
# auto-picks the storage backend at boot:
#
#   - if the canonical Astra env vars are set —
#     `ASTRA_DB_API_ENDPOINT` + `ASTRA_DB_APPLICATION_TOKEN` —
#     all workspace / agent / KB / job metadata lives in Astra
#     Data API Tables. The astra-cli auto-detection on boot also
#     fills these env vars for any developer with a working
#     astra-cli profile, so Astra is the out-of-the-box default
#     when the runtime can reach it.
#   - otherwise, persists to a JSON tree under `./.workbench-data/`
#     (gitignored). Restarting `npm run dev` doesn't wipe your work.
#
# Override with an explicit `controlPlane:` block if you want a
# specific backend regardless of env. Examples:
#
#   controlPlane:
#     driver: memory             # no persistence; lost on restart
#
#   controlPlane:
#     driver: file
#     root: .workbench-data
#
#   controlPlane:
#     driver: astra
#     endpoint: https://<id>-<region>.apps.astra.datastax.com
#     tokenRef: env:ASTRA_DB_APPLICATION_TOKEN
#     keyspace: default_keyspace   # Astra DB auto-creates this on
#                                  # every new database; override
#                                  # with a dedicated keyspace if
#                                  # you'd rather isolate workbench
#                                  # tables from other workloads.
#
# See docs/configuration.md for the full reference.

version: 1

runtime:
  port: 8080
  logLevel: info
  # Optional — opt-in anonymous usage telemetry. Off by default.
  # `enabled: true` + `url: null` is "dark mode": events are
  # constructed and logged but never POSTed, useful for verifying
  # the wiring before pointing at a collector. WORKBENCH_TELEMETRY
  # and WORKBENCH_TELEMETRY_URL env vars override these. See
  # docs/telemetry.md for the event catalog + no-PII guarantee.
  # telemetry:
  #   enabled: false
  #   url: null  # e.g. https://telemetry.example.com/v1/events

# Optional — loaded into the memory backend at startup. Ignored by
# `file` and `astra` backends. Only useful when you flip `driver`
# back to `memory`.
#
# seedWorkspaces:
#   - name: demo
#     kind: mock
#   - name: prod-astra
#     kind: astra
#     url: env:ASTRA_DB_API_ENDPOINT
#     credentials:
#       token: env:ASTRA_DB_APPLICATION_TOKEN
#     keyspace: default_keyspace

# Optional — auth enforcement. Default is `disabled` + `allow`, which
# matches pre-auth behavior (everything anonymous, routes don't
# enforce). Uncomment ONE stanza to turn enforcement on. See
# docs/auth.md for the full matrix.
#
# Workspace-scoped API keys (Phase 2):
# auth:
#   mode: apiKey
#   anonymousPolicy: reject
#   # bootstrapTokenRef: env:WB_BOOTSTRAP_TOKEN  # rotate after setup
#
# OIDC bearer tokens (Phase 3) — JWT signatures verified against the
# issuer's JWKS at request time. Use `mode: any` to accept apiKey AND
# oidc simultaneously.
# auth:
#   mode: oidc
#   anonymousPolicy: reject
#   oidc:
#     issuer: https://login.example.com/realms/workbench
#     audience: ai-workbench
#     # Optional — enables the browser login flow so the web UI stops
#     # requiring paste-a-token. Mounts /auth/{login,callback,me,logout}.
#     # client:
#     #   clientId: ai-workbench-ui
#     #   sessionSecretRef: env:WB_SESSION_SECRET  # 32+ bytes

# Optional — runtime-wide default chat-completion executor used by
# agents that have no per-agent `llmServiceId` of their own. Set
# HUGGINGFACE_API_KEY in your .env
# (https://huggingface.co/settings/tokens) and uncomment the block
# below. Without `chat:` AND with no LLM service bound on the agent,
# POST .../messages returns 503 chat_disabled (the rest of the
# runtime works fine).
#
# chat:
#   tokenRef: env:HUGGINGFACE_API_KEY
#   model: Qwen/Qwen2.5-7B-Instruct
#   maxOutputTokens: 1024
#   retrievalK: 6
#   # Override the runtime's default agent system prompt
#   # (null = DEFAULT_AGENT_SYSTEM_PROMPT). Per-agent
#   # `agent.systemPrompt` always takes precedence over this.
#   # systemPrompt: null

# Optional — exposes the workspace's read surface as a Model Context
# Protocol server at /api/v1/workspaces/{w}/mcp so external agents
# (Claude Code, Cursor, hosted MCP gateways) can use the workspace
# as a context backend. **On by default** (shares the same auth gate
# as the rest of /api/v1/*); set `enabled: false` to disable. See
# docs/mcp.md.
#
# mcp:
#   enabled: false        # uncomment to turn the MCP route off
#   # Also expose `chat_send`, which appends a turn to an agent-owned
#   # conversation through the runtime's global chat service.
#   # Requires the `chat:` block above.
#   exposeChat: true
