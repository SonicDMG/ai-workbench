# Default dev config. With no `controlPlane:` block, the runtime
# auto-picks the storage backend at boot:
#
#   - if the canonical Astra env vars are set —
#     `ASTRA_DB_API_ENDPOINT` + `ASTRA_DB_APPLICATION_TOKEN` —
#     all workspace / agent / KB / job metadata lives in Astra
#     Data API Tables. The astra-cli auto-detection on boot also
#     fills these env vars for any developer with a working
#     astra-cli profile, so Astra is the out-of-the-box default
#     when the runtime can reach it.
#   - otherwise, persists to a JSON tree under `./.workbench-data/`
#     (gitignored). Restarting `npm run dev` doesn't wipe your work.
#
# Override with an explicit `controlPlane:` block if you want a
# specific backend regardless of env. Examples:
#
#   controlPlane:
#     driver: memory             # no persistence; lost on restart
#
#   controlPlane:
#     driver: file
#     root: .workbench-data
#
#   controlPlane:
#     driver: astra
#     endpoint: https://<id>-<region>.apps.astra.datastax.com
#     tokenRef: env:ASTRA_DB_APPLICATION_TOKEN
#     keyspace: workbench
#
# See docs/configuration.md for the full reference.

version: 1

runtime:
  port: 8080
  logLevel: info

# Optional — loaded into the memory backend at startup. Ignored by
# `file` and `astra` backends. Only useful when you flip `driver`
# back to `memory`.
#
# seedWorkspaces:
#   - name: demo
#     kind: mock

# Optional — wires up the chat-with-Bobbie surface. Set
# HUGGINGFACE_API_KEY in your .env (https://huggingface.co/settings/tokens)
# and uncomment the block below. Without `chat`, POST .../messages
# returns 503 chat_disabled (the rest of the runtime works fine).
#
# chat:
#   tokenRef: env:HUGGINGFACE_API_KEY
#   model: Qwen/Qwen2.5-7B-Instruct
#   maxOutputTokens: 1024
#   retrievalK: 6
#   # Override Bobbie's persona (null = built-in default):
#   # systemPrompt: null

# Optional — exposes the workspace's read surface as a Model Context
# Protocol server at /api/v1/workspaces/{w}/mcp so external agents
# (Claude Code, Cursor, hosted MCP gateways) can use the workspace
# as a context backend. Off by default — enable explicitly. See
# docs/mcp.md.
#
# mcp:
#   enabled: true
#   # Also expose `chat_send`, which routes a message through Bobbie.
#   # Requires the `chat:` block above.
#   exposeChat: false
