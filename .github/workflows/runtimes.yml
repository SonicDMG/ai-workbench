name: Runtime Scaffolds

on:
  push:
    branches: [main]
    paths:
      - 'runtimes/python/**'
      - 'runtimes/java/**'
      - '.github/workflows/runtimes.yml'
  pull_request:
    paths:
      - 'runtimes/python/**'
      - 'runtimes/java/**'
      - '.github/workflows/runtimes.yml'

permissions:
  contents: read

concurrency:
  group: runtimes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: runtimes/python/pyproject.toml

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: runtimes/typescript/package-lock.json

      - name: Install mock-astra deps
        run: npm --prefix runtimes/typescript ci --no-audit --no-fund

      - name: Install
        working-directory: runtimes/python
        run: python -m pip install -e '.[dev]'

      - name: Ruff
        working-directory: runtimes/python
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        working-directory: runtimes/python
        run: mypy src

      - name: Pytest
        working-directory: runtimes/python
        run: |
          npm --prefix ../../runtimes/typescript run conformance:mock &
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4010/_health >/dev/null; then
              break
            fi
            sleep 1
          done
          pytest

  java:
    name: Java Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: '8.14.3'

      - name: Test
        working-directory: runtimes/java
        run: gradle test
