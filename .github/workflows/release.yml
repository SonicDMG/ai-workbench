name: Release

# Tag-driven release. Push a tag of the form `vX.Y.Z` to `main`
# (e.g. via `git tag v0.1.0 && git push --tags`) and this workflow
# publishes the CLI to npm, pushes the runtime Docker image to
# GHCR, builds cross-platform single-binary CLI artifacts, and
# creates the GitHub Release with the matching CHANGELOG section.
#
# The workflow is intentionally split into separate jobs so a
# single failure (e.g. a transient npm publish flake) doesn't block
# the others; rerun just the failed job from the GH UI.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write          # create the GitHub Release
  packages: write          # push to GHCR
  id-token: write          # npm provenance attestations

jobs:
  test:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run install:ts
      - run: npm run install:web
      - run: npm run install:cli
      - run: npm run check

  publish-npm:
    name: Publish @ai-workbench/cli to npm
    needs: test
    runs-on: ubuntu-latest
    # TODO: re-enable once the `@ai-workbench` npm scope is created
    # and an `NPM_TOKEN` secret with publish access is added to the
    # repo. With `if: false`, this job is skipped without blocking
    # the downstream `github-release` job (which has been updated to
    # no longer depend on it).
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm --prefix packages/aiw-cli ci
      - run: npm --prefix packages/aiw-cli run build
      - run: npm --prefix packages/aiw-cli publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Each arch is built on a native runner and pushed by digest to GHCR.
  # QEMU emulation of `npm` on arm64/node:22-alpine is flaky (SIGILL
  # inside emulated npm), so we avoid it entirely; the merge job below
  # then stitches the per-arch digests into a single manifest list.
  # See https://docs.docker.com/build/ci/github-actions/multi-platform/
  build-docker-arch:
    name: Build runtime image (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/typescript/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-docker:
    name: Merge runtime image manifest and push to GHCR
    needs: build-docker-arch
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:latest \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}

  build-cli-binaries:
    name: Build single-binary CLI (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: macos-arm64
            binary: aiw-macos-arm64
          - runner: ubuntu-latest
            target: linux-x64
            binary: aiw-linux-x64
          - runner: windows-latest
            target: windows-x64
            binary: aiw-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm --prefix packages/aiw-cli ci
      - name: Build single-binary
        working-directory: packages/aiw-cli
        shell: bash
        run: |
          bun build --compile --target=bun-${{ matrix.target }} \
            ./src/cli.ts --outfile ${{ matrix.binary }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: packages/aiw-cli/${{ matrix.binary }}

  github-release:
    name: Create GitHub Release
    # `publish-npm` is intentionally absent from `needs` while it's
    # gated `if: false` — a skipped job otherwise cascades to its
    # dependents and we'd lose the GitHub Release too. Add it back
    # the same commit that re-enables publish-npm.
    needs: [build-docker, build-cli-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          # Skip the `*.dockerbuild` artifact auto-uploaded by
          # docker/build-push-action; we only want the CLI binaries
          # from build-cli-binaries. Including the dockerbuild blob
          # also makes the download step flaky (it sometimes fails
          # the v4 retry budget) and would attach a build-internal
          # archive to the release.
          pattern: aiw-*
          path: artifacts
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Print the section between `## [VERSION]` and the next `## [`.
          # Brackets are quoted inside the awk regex literal so the
          # version value can be passed as a plain string via -v
          # (awk -v strips backslashes from non-escape sequences, so
          # `\[` injected through -v becomes a character class).
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for $VERSION; using a generic body."
            echo "Release $VERSION. See CHANGELOG.md for details." > release-notes.md
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/**/*
          fail_on_unmatched_files: false
