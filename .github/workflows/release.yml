name: Release

# Tag-driven release. Push a tag of the form `vX.Y.Z` to `main`
# (e.g. via `git tag v0.1.0 && git push --tags`) and this workflow
# publishes the CLI to npm, pushes the runtime Docker image to
# GHCR, builds cross-platform single-binary CLI artifacts, and
# creates the GitHub Release with the matching CHANGELOG section.
#
# The workflow is intentionally split into separate jobs so a
# single failure (e.g. a transient npm publish flake) doesn't block
# the others; rerun just the failed job from the GH UI.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write          # create the GitHub Release
  packages: write          # push to GHCR
  id-token: write          # npm provenance attestations

jobs:
  test:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run install:ts
      - run: npm run install:web
      - run: npm run install:cli
      - run: npm run check

  publish-npm:
    name: Publish @ai-workbench/cli to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm --prefix packages/aiw-cli ci
      - run: npm --prefix packages/aiw-cli run build
      - run: npm --prefix packages/aiw-cli publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-docker:
    name: Build + push runtime image to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/typescript/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  build-cli-binaries:
    name: Build single-binary CLI (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: macos-arm64
            binary: aiw-macos-arm64
          - runner: ubuntu-latest
            target: linux-x64
            binary: aiw-linux-x64
          - runner: windows-latest
            target: windows-x64
            binary: aiw-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm --prefix packages/aiw-cli ci
      - name: Build single-binary
        working-directory: packages/aiw-cli
        shell: bash
        run: |
          bun build --compile --target=bun-${{ matrix.target }} \
            ./src/cli.ts --outfile ${{ matrix.binary }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: packages/aiw-cli/${{ matrix.binary }}

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, build-docker, build-cli-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Print the section between `## [VERSION]` and the next `## [`.
          awk -v ver="[$VERSION]" '
            $0 ~ "^## " ver { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for $VERSION; using a generic body."
            echo "Release $VERSION. See CHANGELOG.md for details." > release-notes.md
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/**/*
          fail_on_unmatched_files: false
